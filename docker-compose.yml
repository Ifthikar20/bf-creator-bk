version: '3.8'

services:
  creator-backend:
    build: .
    ports:
      - "8001:8001"
    env_file:
      - .env
    depends_on:
      - db
    restart: unless-stopped

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: betterbliss
      POSTGRES_USER: betterbliss_user
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
